name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wigenz_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d wigenz_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      PORT: 3000
      CORS_ORIGIN: http://localhost:3001
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: wigenz_db
      DB_SSL: "false"
      JWT_SECRET: ci_jwt_secret
      JWT_REFRESH_SECRET: ci_refresh_secret
      SUPER_ADMIN_EMAIL: admin@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint (syntax)
        run: npm run lint

      - name: ReBAC readiness check
        env:
          REBAC_READINESS_STRICT: "true"
        run: npm run check:rebac-readiness

      - name: Validate i18n
        run: npm run validate:i18n

      - name: Run migrations
        run: npm run migrate

      - name: Run tests
        run: npm test
